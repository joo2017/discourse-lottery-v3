# file: discourse-lottery-v3/config/settings.yml

plugins:
  lottery_enabled:
    default: true
    client: true # 前端需要知道插件是否开启

  # 新增：允许抽奖的分类
  lottery_allowed_categories:
    default: ""
    type: category_list
    client: true # 关键：必须暴露给前端，用于判断是否显示表单

  lottery_min_participants_global:
    default: 5
    min: 1
    client: true 

  lottery_post_lock_delay_minutes:
    default: 30
    min: 0
    client: false

  lottery_excluded_groups:
    default: ""
    type: "group_list"
    client: false
